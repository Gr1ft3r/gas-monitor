name: Weekly DOE Price Sync

on:
  schedule:
    # This Cron syntax means: Run at 08:00 UTC (4:00 PM Philippine Time) every Monday (Day 1)
    - cron: '0 8 * * 1'
  
  # This line adds a button in GitHub so you can manually click "Run" to test it anytime!
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Required Libraries
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the DOE Web Scraper & Database Updater
        env:
          # We securely map your GitHub Secrets to the script
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: python updater.py