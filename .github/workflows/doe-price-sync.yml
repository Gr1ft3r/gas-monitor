name: DOE Price Auto-Sync

on:
  schedule:
    - cron: "0 0 * * 2"  # Every Tuesday 8:00 AM PHT (UTC+8)

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run? (prints changes but does NOT write to database)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-prices:
    name: Scrape DOE Advisory & Update Prices
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Debug step: safely prints URL length and first 8 chars to confirm it loaded correctly.
      # GitHub automatically masks the full secret value in logs, so this is safe.
      - name: Validate secrets are set
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'EOF'
          import os, sys, re

          url = os.environ.get("SUPABASE_URL", "")
          key = os.environ.get("SUPABASE_KEY", "")

          print(f"SUPABASE_URL length : {len(url)} chars")
          print(f"SUPABASE_URL starts : {url[:8]}...")
          print(f"SUPABASE_URL ends   : ...{url[-15:] if len(url) > 15 else url}")
          print(f"SUPABASE_KEY length : {len(key)} chars")

          # Check for markdown link artifacts
          if "[http" in url or "](http" in url:
              print()
              print("ERROR: SUPABASE_URL contains markdown link formatting!")
              print("  Found: characters like [https://...](https://...)")
              print("  Fix: Go to Settings > Secrets > SUPABASE_URL")
              print("  Paste ONLY the bare URL: https://xxxx.supabase.co")
              sys.exit(1)

          if not url.startswith("https://"):
              print()
              print(f"ERROR: SUPABASE_URL does not start with https://")
              print(f"  Got: {url[:30]}...")
              sys.exit(1)

          if not key:
              print()
              print("ERROR: SUPABASE_KEY is empty. Check your GitHub Secret.")
              sys.exit(1)

          print()
          print("Secrets look valid.")
          EOF

      - name: Run DOE price sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/sync_prices.py

      - name: Post run summary
        if: always()
        run: |
          echo "## DOE Sync Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run time:** $(date +'%A, %B %d %Y %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** ${{ github.event.inputs.dry_run == 'true' && 'Dry Run' || 'Live' }}" >> $GITHUB_STEP_SUMMARY